<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETKC | Dispatch Terminal</title>
    <style>
        :root {
            --bg-dark: #09090b;
            --window-bg: #121214;
            --term-green: #10b981;
            --term-dim: #064e3b;
            --term-warn: #fbbf24;
            --header-gray: #1f1f23;
            --border: #27272a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* MACOS WINDOW FRAME */
        .window {
            width: 95%;
            max-width: 1000px;
            background: var(--window-bg);
            border-radius: 12px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
            border: 1px solid var(--border);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .window-header {
            background: var(--header-gray);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        .title { font-size: 0.75rem; color: #a1a1aa; text-transform: uppercase; flex-grow: 1; text-align: center; letter-spacing: 2px; }

        .terminal-body { padding: 30px; }

        /* INPUT AREA */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid var(--term-dim);
            background: rgba(16, 185, 129, 0.03);
            border-radius: 4px;
        }

        .field label { display: block; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 8px; color: var(--term-dim); font-weight: bold; }
        select, input {
            background: #000;
            border: 1px solid var(--term-dim);
            color: var(--term-green);
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
            font-size: 0.9rem;
        }
        select:focus, input:focus { border-color: var(--term-green); box-shadow: 0 0 5px rgba(16, 185, 129, 0.3); }

        /* OUTPUT AREA */
        #manifest {
            background: #000;
            padding: 30px;
            border: 1px solid var(--term-dim);
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 0.9rem;
            border-radius: 4px;
            position: relative;
        }

        .total-box { 
            font-size: 1.8rem; 
            color: #fff; 
            border-top: 2px double var(--term-green); 
            margin-top: 20px; 
            padding-top: 15px;
            display: block;
        }

        .log { color: var(--term-warn); font-size: 0.8rem; display: block; margin-top: 6px; }

        .btn-copy {
            width: 100%;
            margin-top: 25px;
            background: transparent;
            border: 2px solid var(--term-green);
            color: var(--term-green);
            padding: 18px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
        }
        .btn-copy:hover { background: var(--term-green); color: #000; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--window-bg); }
        ::-webkit-scrollbar-thumb { background: var(--term-dim); border-radius: 4px; }
    </style>
</head>
<body>

<div class="window">
    <div class="window-header">
        <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
        <div class="title">etkc_dispatch_os — build_v5.2_final</div>
    </div>

    <div class="terminal-body">
        <div class="grid">
            <div class="field">
                <label>Service Category</label>
                <select id="service" onchange="calculate()">
                    <option value="Transfer">Transfer / Point-to-Point</option>
                    <option value="As-Directed">As-Directed (Hourly + Miles)</option>
                </select>
            </div>
            <div class="field">
                <label>Vehicle Fleet</label>
                <select id="vehicle" onchange="calculate()"></select>
            </div>
            <div class="field">
                <label>Location / Place Rules</label>
                <select id="place" onchange="calculate()"></select>
            </div>
            <div class="field">
                <label>Trip Date</label>
                <input type="date" id="tDate" onchange="calculate()">
            </div>
            <div class="field">
                <label>Pickup Time</label>
                <input type="time" id="tTime" value="12:00" onchange="calculate()">
            </div>
            <div class="field">
                <label>Est. Total Miles</label>
                <input type="number" id="miles" value="7" oninput="calculate()">
            </div>
            <div class="field">
                <label>Est. Hours (As-Directed)</label>
                <input type="number" id="hrs" value="4" step="0.5" oninput="calculate()">
            </div>
        </div>

        <div id="manifest">LOADING_ENCRYPTED_DATABASE...</div>
        <button class="btn-copy" onclick="copyQuote()">[ GENERATE & COPY MANIFEST ]</button>
    </div>
</div>

<script>
    const URLS = {
        rates: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyRAPuP_5jMNfPhbudKBQss11tBPnELGmDVCTbRS_XzfFjZ1_wKfXUU5AQdBPyA/pub?gid=1067121759&single=true&output=csv',
        date: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyRAPuP_5jMNfPhbudKBQss11tBPnELGmDVCTbRS_XzfFjZ1_wKfXUU5AQdBPyA/pub?gid=1064316017&single=true&output=csv',
        time: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyRAPuP_5jMNfPhbudKBQss11tBPnELGmDVCTbRS_XzfFjZ1_wKfXUU5AQdBPyA/pub?gid=1590043173&single=true&output=csv',
        place: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyRAPuP_5jMNfPhbudKBQss11tBPnELGmDVCTbRS_XzfFjZ1_wKfXUU5AQdBPyA/pub?gid=1310928419&single=true&output=csv'
    };

    let DB = { rates: [], date: [], time: [], place: [] };

    async function fetchData(url) {
        const r = await fetch(url);
        const d = await r.text();
        return d.split('\n').slice(1).map(row => row.split(','));
    }

    async function init() {
        try {
            const [rData, dData, tData, pData] = await Promise.all([
                fetchData(URLS.rates), fetchData(URLS.date), fetchData(URLS.time), fetchData(URLS.place)
            ]);

            DB.rates = rData.filter(x => x[0]).map(x => ({ 
                name: x[0].trim(), hr: parseFloat(x[1]), min: parseFloat(x[2]), 
                allowance: parseFloat(x[3]), baseMile: parseFloat(x[4]), 
                over: parseFloat(x[5]), grat: parseFloat(x[6])/100, 
                fuel: parseFloat(x[7])/100, admin: parseFloat(x[8])/100 
            }));
            DB.date = dData.filter(x => x[0]).map(x => ({ name: x[0].trim(), s: x[1].trim(), e: x[2].trim(), min: parseFloat(x[3]), multi: parseFloat(x[4]) }));
            DB.time = tData.filter(x => x[0]).map(x => ({ name: x[0].trim(), s: x[1].trim(), e: x[2].trim(), fee: parseFloat(x[3]) }));
            DB.place = pData.filter(x => x[0]).map(x => ({ name: x[0].trim(), fee: parseFloat(x[1]), min: parseFloat(x[2]) }));

            const vSel = document.getElementById('vehicle');
            DB.rates.forEach(v => { vSel.innerHTML += `<option value="${v.name}">${v.name}</option>`; });
            
            const pSel = document.getElementById('place');
            DB.place.forEach(p => { pSel.innerHTML += `<option value="${p.name}">${p.name}</option>`; });

            calculate();
        } catch (e) { document.getElementById('manifest').innerHTML = "!! SYSTEM_HALT: DATABASE_SYNC_ERROR !!"; }
    }

    function calculate() {
        const v = DB.rates.find(x => x.name === document.getElementById('vehicle').value);
        const p = DB.place.find(x => x.name === document.getElementById('place').value);
        const service = document.getElementById('service').value;
        const dVal = document.getElementById('tDate').value;
        const tVal = document.getElementById('tTime').value;
        let hrs = parseFloat(document.getElementById('hrs').value) || 0;
        let miles = parseFloat(document.getElementById('miles').value) || 0;

        let logs = [];
        let dateMulti = 1.0;

        // 1. BASE MATH (Hourly + Mileage)
        let mileageCost = (miles <= v.allowance) ? v.baseMile : v.baseMile + ((miles - v.allowance) * v.over);
        let hourlyTotal = 0;

        if (service === "As-Directed") {
            let effectiveHrs = Math.max(hrs, v.min, p.min);
            if (dVal) {
                const dRule = DB.date.find(r => dVal >= r.s && dVal <= r.e);
                if (dRule) {
                    dateMulti = dRule.multi;
                    effectiveHrs = Math.max(effectiveHrs, dRule.min);
                    if (dRule.multi > 1) logs.push(`>> DATE_SURCHARGE: ${dRule.name} Active (${((dRule.multi-1)*100).toFixed(0)}%)`);
                }
            }
            hourlyTotal = effectiveHrs * v.hr;
            logs.push(`>> BILLING_MODE: AS-DIRECTED (${effectiveHrs}h @ $${v.hr}/hr)`);
        } else {
            logs.push(`>> BILLING_MODE: POINT-TO-POINT / TRANSFER`);
        }

        // 2. PERCENTAGE CALCULATIONS (Precision Rounding)
        const baseSub = (hourlyTotal + mileageCost) * dateMulti;
        const adminFee = Math.round(baseSub * v.admin * 100) / 100;
        const fuelFee = Math.round(baseSub * v.fuel * 100) / 100;
        const gratFee = Math.round(baseSub * v.grat * 100) / 100;

        // 3. FLAT SURCHARGES
        const tRule = DB.time.find(r => tVal >= r.s && tVal <= r.e);
        const timeFee = tRule ? tRule.fee : 0;
        const placeFee = p.fee;
        if (timeFee > 0) logs.push(`>> TIME_SURCHARGE: $${timeFee.toFixed(2)} (${tRule.name})`);
        if (placeFee > 0) logs.push(`>> PLACE_FEE: $${placeFee.toFixed(2)} (${p.name})`);

        const total = baseSub + adminFee + fuelFee + gratFee + timeFee + placeFee;

        // 4. THE OUTPUT
        const manifest = `------------------------------------------------------------
          EXCLUSIVE TRANSPORTATION KC // QUOTE
------------------------------------------------------------
TYPE:     ${service.toUpperCase()}
VEHICLE:  ${v.name.toUpperCase()}
DATE:     ${dVal || 'N/A'} | TIME: ${tVal}
------------------------------------------------------------
BASE RATE:           $${baseSub.toFixed(2)}
ADMIN FEE (${(v.admin*100).toFixed(0)}%):       $${adminFee.toFixed(2)}
FUEL SURCH (${(v.fuel*100).toFixed(1)}%):      $${fuelFee.toFixed(2)}
STD GRAT (${(v.grat*100).toFixed(0)}%):        $${gratFee.toFixed(2)}
ADDTL SURCHARGES:    $${(timeFee + placeFee).toFixed(2)}
------------------------------------------------------------
${logs.map(l => `<span class="log">${l}</span>`).join('')}
<div class="total-box">ESTIMATED TOTAL: $${total.toFixed(2)}</div>
------------------------------------------------------------`;

        document.getElementById('manifest').innerHTML = manifest;
    }

    function copyQuote() {
        const text = document.getElementById('manifest').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerText;
            btn.innerText = "COPIED TO CLIPBOARD!";
            setTimeout(() => btn.innerText = originalText, 2000);
        });
    }

    init();
</script>

</body>
</html>
